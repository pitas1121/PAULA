<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una pregunta para ti</title>

<style>
    .fondo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.burbuja{
    position:absolute;
    bottom:-20px;
    width:8px;
    height:8px;
    background:rgba(255,255,255,0.6);
    border-radius:50%;
    animation:subir 8s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffe6f0;

    /* centra vertical y horizontal */
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

h2{
    font-size:28px;
}

p{
    font-size:20px;
}

button{
    width:80%;
    max-width:320px;
    padding:18px;
    font-size:22px;
    margin:10px;
    border:none;
    border-radius:12px;
}

#inicio{
    background:#ff4d88;
    color:white;
    font-size:28px;
    padding:25px;
}

.si{
    background:#4CAF50;
    color:white;
}

.no{
    background:#ff4444;
    color:white;
}

#pregunta,
#respuestaNo{
    display:none;
}

</style>
</head>

<body>
<div class="fondo"></div>
<button id="inicio" onclick="mostrarPregunta()">Presióname</button>

<div id="pregunta">

<h2>Hola </h2>

<p>
Solo quería decirte que me pareces muy bonita, y dado que no puedo hacer mucho ruido porque seguramente la profesora me mande a sentar adelante, te queria preguntarte:<br><br>
¿Aceptarías salir conmigo a una cita?
</p>

<button class="si" onclick="irWhatsApp()">Sí </button>
<button class="no" onclick="respuestaNo()">No </button>

</div>

<div id="respuestaNo">
<h2>Devuélveme </h2>
</div>

<script>
    const fondo = document.querySelector(".fondo");

function crearBurbuja(){
    const burbuja = document.createElement("div");
    burbuja.classList.add("burbuja");

    burbuja.style.left = Math.random() * 100 + "vw";
    burbuja.style.animationDuration = (5 + Math.random() * 5) + "s";

    fondo.appendChild(burbuja);

    setTimeout(()=>{
        burbuja.remove();
    },10000);
}

setInterval(crearBurbuja,400);

function mostrarPregunta(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("pregunta").style.display="block";
}

function irWhatsApp(){
    window.location.href = "https://wa.me/573024793431?text=Dejame%20Tu%20numero%20🙂";
}

function respuestaNo(){
    document.getElementById("pregunta").style.display="none";
    document.getElementById("respuestaNo").style.display="block";
}

</script>

</body>
</html>
