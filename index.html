<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una pregunta para ti</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffe6f0;
    padding:40px 20px;
}

h2{
    font-size:28px;
}

p{
    font-size:20px;
}

button{
    width:80%;
    max-width:300px;
    padding:15px;
    font-size:20px;
    margin:10px;
    border:none;
    border-radius:10px;
}

#inicio{
    background:#ff4d88;
    color:white;
}

.si{
    background:#4CAF50;
    color:white;
}

.no{
    background:#ff4444;
    color:white;
}

#pregunta,
#respuestaNo{
    display:none;
}

</style>
</head>

<body>

<button id="inicio" onclick="mostrarPregunta()">Presióname</button>

<div id="pregunta">

<h2>Hola 😊</h2>

<p>
Solo quería decirte que me pareces muy bonita.<br><br>
¿Aceptarías salir conmigo a una cita?
</p>

<button class="si" onclick="irWhatsApp()">Sí ❤️</button>

<button class="no" onclick="respuestaNo()">No 😢</button>

</div>

<div id="respuestaNo">

<h2>Devuélveme </h2>

</div>

<script>

function mostrarPregunta(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("pregunta").style.display="block";
}

function irWhatsApp(){
    window.location.href = "https://wa.me/573024793431?text=Hola%20acepto%20la%20cita%";
}

function respuestaNo(){
    document.getElementById("pregunta").style.display="none";
    document.getElementById("respuestaNo").style.display="block";
}

</script>

</body>
</html>
