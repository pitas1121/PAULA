<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una pregunta para ti</title>

<style>
    <style>
.contenedor{
    width:90%;
    max-width:420px;
}
.fondo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.burbuja{
    position:absolute;
    bottom:-20px;
    width:10px;
    height:10px;
    background:rgba(255,255,255,0.5);
    border-radius:50%;
    animation:subir 10s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

/* FONDO ELEGANTE */
body{
    font-family: "Segoe UI", Arial, sans-serif;
    text-align:center;

    background: linear-gradient(135deg,#cdb4ff,#a0d8ff);

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

/* TITULO */
h2{
    font-size:30px;
    color:#333;
}

/* TEXTO */
p{
    font-size:20px;
    line-height:1.5;
}

/* BOTONES */
button{
    width:80%;
    max-width:320px;
    padding:18px;
    font-size:22px;
    margin:10px;
    border:none;
    border-radius:14px;
    cursor:pointer;

    box-shadow:0 6px 12px rgba(0,0,0,0.15);
    transition:0.2s;
}

/* EFECTO CUANDO LO TOCAN */
button:active{
    transform:scale(0.96);
}

/* BOTON INICIAL */
#inicio{
    background:white;
    color:#e63946;
    font-size:30px;
    padding:28px;
}

/* BOTON SI */
.si{
    background:white;
    color:#2a9d8f;
}

/* BOTON NO */
.no{
    background:white;
    color:#e63946;
}

#pregunta,
#respuestaNo{
    display:none;
}

</style>
</head>

<body>
<div class="fondo"></div>

<div class="contenedor">
<button id="inicio" onclick="mostrarPregunta()">Presióname</button>

<div id="pregunta">

<h2>Hola </h2>

<p>
Me pareces muy linda y no quería quedarme con las ganas de decírtelo. Para no arriesgarme a que la profe me mande al frente por hablar... ¿te gustaría salir conmigo a tomar algo después?
</p>

<button class="si" onclick="irWhatsApp()">Sí </button>
<button class="no" onclick="respuestaNo()">No </button>

</div>

<div id="respuestaNo">
<h2>Devuélveme </h2>
</div>

<script>
    const fondo = document.querySelector(".fondo");

function crearBurbuja(){
    const burbuja = document.createElement("div");
    burbuja.classList.add("burbuja");

    burbuja.style.left = Math.random() * 100 + "vw";
    burbuja.style.animationDuration = (5 + Math.random() * 5) + "s";

    fondo.appendChild(burbuja);

    setTimeout(()=>{
        burbuja.remove();
    },10000);
}

setInterval(crearBurbuja,400);

function mostrarPregunta(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("pregunta").style.display="block";
}

function irWhatsApp(){
    window.location.href = "https://wa.me/573024793431?text=Dejame%20tu%20numero%20<3";
}

function respuestaNo(){
    document.getElementById("pregunta").style.display="none";
    document.getElementById("respuestaNo").style.display="block";
}

</script>
</div>
</body>
</html>
