<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una pregunta para ti</title>

<!-- FUENTE BONITA -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: 'Poppins', sans-serif;
    text-align:center;

    background: linear-gradient(135deg,#cdb4ff,#a0d8ff);

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

/* CONTENEDOR */
.contenedor{
    width:90%;
    max-width:420px;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* FONDO BURBUJAS */
.fondo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.burbuja{
    position:absolute;
    bottom:-20px;
    width:10px;
    height:10px;
    background:rgba(255,255,255,0.5);
    border-radius:50%;
    animation:subir 10s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

/* TITULO */
h2{
    font-size:30px;
    color:#333;
}

/* TEXTO */
p{
    font-size:20px;
    line-height:1.6;
}

/* BOTONES */
button{
    width:80%;
    max-width:320px;
    padding:18px;
    font-size:22px;
    margin:10px;
    border:none;
    border-radius:14px;
    cursor:pointer;

    box-shadow:0 6px 12px rgba(0,0,0,0.15);
    transition:0.2s;
}

button:active{
    transform:scale(0.96);
}

/* BOTON PRESIONAME */
#inicio{
    background:#7b8cff;
    color:white;
    font-size:30px;

    height:90px;
    width:80%;
    max-width:320px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:18px;

    box-shadow:0 10px 25px rgba(0,0,0,0.2);

    position:relative;
    overflow:hidden;

    transition:0.2s;

    margin:auto;
}

#inicio:hover{
    background:#8f9cff;
}

/* BRILLO BOTON */
#inicio::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.8),
        transparent
    );

    transform:skewX(-25deg);

    animation:brillo 3s infinite;
}

@keyframes brillo{
    0%{ left:-120%; }
    100%{ left:120%; }
}

/* BOTON SI */
.si{
    background:white;
    color:#2a9d8f;
}

/* BOTON NO */
.no{
    background:white;
    color:#e63946;
}

/* ANIMACION SUAVE */
.animacion{
    animation:aparecer 0.7s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:scale(0.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* OCULTAR AL INICIO */
#pregunta,
#respuestaNo,
#respuestaSi{
    display:none;
}

</style>
</head>

<body>

<div class="fondo"></div>

<div class="contenedor">

<button id="inicio" onclick="mostrarPregunta()">Presióname</button>

<div id="pregunta">

<h2>Hola</h2>

<p>
Me pareces muy linda y no quería quedarme con las ganas de decírtelo.  
Para no arriesgarme a que la profe me mande al frente por hablar...  
¿te gustaría salir conmigo a tomar algo después?
</p>

<button class="si" onclick="irWhatsApp()">Sí</button>
<button class="no" onclick="respuestaNo()">No</button>

</div>

<div id="respuestaSi">
<h2>Me alegra que dijeras que sí 😊</h2>
</div>

<div id="respuestaNo">
<h2>Devuélveme 😅</h2>
</div>

</div>

<script>

const fondo = document.querySelector(".fondo");

function crearBurbuja(){
    const burbuja = document.createElement("div");
    burbuja.classList.add("burbuja");

    burbuja.style.left = Math.random() * 100 + "vw";
    burbuja.style.animationDuration = (5 + Math.random() * 5) + "s";

    fondo.appendChild(burbuja);

    setTimeout(()=>{
        burbuja.remove();
    },10000);
}

setInterval(crearBurbuja,400);

function mostrarPregunta(){

    document.getElementById("inicio").style.display="none";

    const pregunta = document.getElementById("pregunta");
    pregunta.style.display="block";
    pregunta.classList.add("animacion");

}

function irWhatsApp(){

    document.getElementById("pregunta").style.display="none";

    const respuesta = document.getElementById("respuestaSi");
    respuesta.style.display="block";
    respuesta.classList.add("animacion");

    setTimeout(function(){
        window.location.href = "https://wa.me/573024793431?text=Dejame%20tu%20numero";
    },1500);

}

function respuestaNo(){

    document.getElementById("pregunta").style.display="none";

    const respuesta = document.getElementById("respuestaNo");
    respuesta.style.display="block";
    respuesta.classList.add("animacion");

}

</script>

</body>
</html>
